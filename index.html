<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해성중 3학년부 대시보드</title>
    <style>
        :root {
            --bg-color: #121212; 
            --card-bg: #1e1e1e; 
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent-mint: #00D2B4; 
            --accent-gold: #D1B280; 
            --accent-red: #FF6B6B;
            /* 스포츠 팀별 색상 */
            --lg-color: #90CAF9;
            --nc-color: #FFE082;
            --lotte-color: #FFAB91;
        }

        body { margin: 0; padding: 20px; background-color: #121212; color: var(--text-main); font-family: 'Pretendard', 'Malgun Gothic', sans-serif; height: 100vh; box-sizing: border-box; display: flex; justify-content: center; align-items: center; }

        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1400px; height: 90vh; }
        
        .sidebar { width: 220px; background-color: var(--card-bg); border-radius: 16px; padding: 24px; box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; border: 1px solid rgba(255, 255, 255, 0.05); overflow-y: auto; }
        .sidebar-title { font-size: 1.1rem; font-weight: bold; color: var(--accent-mint); margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; text-align: center; flex-shrink: 0;}
        .shortcut-btn { display: flex; align-items: center; gap: 12px; padding: 10px 15px; background: rgba(255, 255, 255, 0.05); border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.95rem; transition: all 0.2s ease; flex-shrink: 0;}
        .shortcut-icon { font-size: 1.1rem; }

        .shortcut-btn.group-1 { color: #90CAF9; } 
        .shortcut-btn.group-2 { color: #FFE082; } 
        .shortcut-btn.group-3 { color: #CE93D8; } 
        .shortcut-btn.group-4 { color: #A5D6A7; } 
        .shortcut-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }

        .menu-divider { border-top: 1px dashed rgba(255,255,255,0.15); margin: 4px 0; flex-shrink: 0; }

        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 3.5fr 6.5fr; gap: 20px; flex-grow: 1; }
        
        .card { background-color: var(--card-bg); border-radius: 16px; padding: 24px; box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3); display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-header { font-size: 1.2rem; font-weight: bold; color: var(--accent-mint); margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

        .card-1 { grid-area: 1 / 1 / 2 / 2; } 
        .card-4 { grid-area: 1 / 2 / 2 / 3; } 
        .card-3 { grid-area: 2 / 1 / 3 / 2; } 
        .card-2 { grid-area: 2 / 2 / 3 / 3; } 

        .date-display { font-size: 1.1rem; color: var(--text-sub); text-align: center; }
        .time-display { font-size: 3.2rem; font-weight: bold; text-align: center; color: var(--accent-gold); letter-spacing: 2px; }
        .weather-display { font-size: 1rem; text-align: center; color: #fff; margin: 5px 0; font-weight: 500; }
        .lunch-box { margin-top: auto; background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 8px; text-align: center; }
        .lunch-title { font-size: 0.9rem; color: var(--accent-mint); font-weight: bold; margin-bottom: 5px; }
        .lunch-menu { font-size: 0.95rem; line-height: 1.4; word-break: keep-all; }

        /* 스포츠 전용 스타일 */
        #sportsBoard { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        .sports-item { background: rgba(255, 255, 255, 0.05); padding: 12px 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .item-lg { border-left: 5px solid var(--lg-color); }
        .item-nc { border-left: 5px solid var(--nc-color); }
        .item-lotte { border-left: 5px solid var(--lotte-color); }
        .team-tag { font-weight: 800; font-size: 1.1rem; color: var(--text-main); } 
        .lg-text { color: var(--lg-color); }
        .nc-text { color: var(--nc-color); }
        .lotte-text { color: var(--lotte-color); }
        .game-time { font-size: 0.85rem; color: var(--text-sub); }
        .game-location { font-size: 0.85rem; color: #888; }

        /* 전달사항 & 디데이 */
        #noticeBoard, #ddayList { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .section-title { font-size: 0.95rem; font-weight: bold; color: var(--accent-gold); margin-bottom: 8px; margin-top: 15px; display: flex; align-items: center; gap: 5px; }
        .section-title:first-child { margin-top: 0; }
        .section-divider { border-top: 1px dashed rgba(255,255,255,0.1); margin: 15px 0 10px 0; }
        
        .notice-item { position: relative; border-radius: 10px; padding: 16px; margin-bottom: 10px; }
        .notice-item.today { background: rgba(0, 210, 180, 0.1); border: 1px solid rgba(0, 210, 180, 0.3); }
        .notice-item.past { background: rgba(0, 0, 0, 0.15); border: 1px solid rgba(255,255,255,0.05); }
        .notice-time { font-size: 0.8rem; color: #888; display: block; margin-bottom: 5px; font-weight: bold; }
        .notice-text { font-size: 1rem; line-height: 1.6; color: #fff; }

        .d-day-box { background: rgba(0, 0, 0, 0.2); padding: 12px 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 1.05rem; border-left: 3px solid var(--accent-mint); transition: all 0.3s; }
        .d-day-box.dday-today { background: rgba(255, 107, 107, 0.12); border-left: 4px solid var(--accent-red); }
        .accent-text { color: var(--accent-red); font-weight: bold; margin-right: 5px; }
        
        .period-notifier { font-size: 1.1rem; font-weight: bold; text-align: center; padding: 10px; background: rgba(209, 178, 128, 0.15); color: var(--accent-gold); border-radius: 8px; margin-bottom: 15px; border: 1px dashed rgba(209, 178, 128, 0.3); }
        
        .action-btn { background: none; border: none; cursor: pointer; opacity: 0.5; transition: 0.2s; font-size: 1rem; }
        .action-btn:hover { opacity: 1; transform: scale(1.1); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* ★ 모달창 (수정창) 디자인 개선 (글씨 크기, 여백 완벽 수정) */
        #editModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); width: 480px; padding: 30px; border-radius: 12px; border: 1px solid var(--accent-mint); display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-content textarea { 
            width: 100%; 
            height: 160px; 
            background: rgba(0,0,0,0.3); 
            color: #fff; 
            padding: 15px; 
            border-radius: 6px; 
            border: 1px solid rgba(255,255,255,0.1); 
            font-family: inherit; 
            font-size: 1.1rem; /* 글씨 크기 키움 */
            line-height: 1.5;  /* 줄 간격 넓힘 */
            resize: none; 
            outline: none; 
            box-sizing: border-box; /* ★ 여백 삐져나가는 문제 완벽 해결 */
        }
        .modal-content textarea:focus { border-color: var(--accent-mint); }
    </style>
</head>
<body>

    <div id="editModal">
        <div class="modal-content">
            <h3 style="color:var(--accent-mint); margin:0;">✏️ 전달사항 수정</h3>
            <textarea id="editModalInput"></textarea>
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="closeEditModal()" style="padding:10px 18px; background:#444; color:#fff; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">취소</button>
                <button onclick="saveEdit()" style="padding:10px 18px; background:var(--accent-mint); color:#000; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">저장</button>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="sidebar">
            <div class="sidebar-title">⭐ 바로가기</div>
            <a href="https://gne.eduptl.kr/bpm_lgn_lg00_001.do?noEpSession" target="_blank" class="shortcut-btn group-1"><span class="shortcut-icon">🏢</span> 업무포털 (경남)</a>
            <a href="https://newtab.itt.link/v3/index.do" target="_blank" class="shortcut-btn group-1"><span class="shortcut-icon">💬</span> 아이톡톡</a>
            <a href="https://www.naver.com" target="_blank" class="shortcut-btn group-1"><span class="shortcut-icon">🟩</span> 네이버</a>
            <a href="https://www.google.com" target="_blank" class="shortcut-btn group-1"><span class="shortcut-icon">🔍</span> 구글</a>
            <div class="menu-divider"></div>
            <a href="http://seastar-m.gne.go.kr" target="_blank" class="shortcut-btn group-2"><span class="shortcut-icon">🏫</span> 해성중학교</a>
            <a href="https://joo.is/고등학교희망" target="_blank" class="shortcut-btn group-2"><span class="shortcut-icon">🎓</span> 3학년 진학희망 고교</a>
            <a href="https://joo.is/해성중정보화기기" target="_blank" class="shortcut-btn group-2"><span class="shortcut-icon">🛠️</span> 정보기기 수리접수</a>
            <a href="https://joo.is/해성중업무" target="_blank" class="shortcut-btn group-2"><span class="shortcut-icon">📑</span> 해성중 업무시트</a>
            <div class="menu-divider"></div>
            <a href="https://chatgpt.com" target="_blank" class="shortcut-btn group-3"><span class="shortcut-icon">🤖</span> ChatGPT</a>
            <a href="https://gemini.google.com" target="_blank" class="shortcut-btn group-3"><span class="shortcut-icon">✨</span> 제미나이</a>
            <a href="https://search.naver.com/search.naver?query=계산기" target="_blank" class="shortcut-btn group-3"><span class="shortcut-icon">🧮</span> 네이버 계산기</a>
            <a href="https://www.miricanvas.com/" target="_blank" class="shortcut-btn group-3"><span class="shortcut-icon">🎨</span> 미리캔버스</a>
            <div class="menu-divider"></div>
            <a href="https://www.gneti.or.kr" target="_blank" class="shortcut-btn group-4"><span class="shortcut-icon">📚</span> 경남교육연수</a>
            <a href="https://www.gnlec.kr/" target="_blank" class="shortcut-btn group-4" style="margin-bottom: auto;"><span class="shortcut-icon">💻</span> 온라인 전달연수</a>
        </div>

        <div class="dashboard-container">
            <div class="card card-1">
                <div class="card-header">🕒 시간 · 날씨 · 급식</div>
                <div class="date-display" id="currentDate">0000년 00월 00일 (요일)</div>
                <div class="time-display" id="currentTime">00:00:00</div>
                <div class="weather-display" id="weatherInfo">☁️ 로딩중...</div>
                <div class="lunch-box">
                    <div class="lunch-title">🍽️ 해성중학교 오늘의 급식</div>
                    <div id="lunchMenu" class="lunch-menu">로딩중...</div>
                </div>
            </div>

            <div class="card card-4">
                <div class="card-header" style="color: var(--accent-gold);">🏆 스포츠 경기 일정 <button onclick="fetchSports()" style="background:none; border:none; color:inherit; cursor:pointer;">🔄</button></div>
                <div id="sportsBoard"></div>
            </div>

            <div class="card card-3">
                <div class="card-header" style="color: var(--accent-mint);">📢 3학년부 전달사항 <button onclick="fetchNotices()" style="background:none; border:none; color:inherit; cursor:pointer;">🔄</button></div>
                <div id="noticeBoard"></div>
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <textarea id="noticeInput" placeholder="새로운 전달사항 (Enter: 전송)" style="flex-grow:1; background:rgba(0,0,0,0.2); color:#fff; border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:10px; font-family:inherit; font-size:1rem; box-sizing:border-box;" onkeydown="checkEnter(event)"></textarea>
                    <button onclick="postNotice()" style="background:var(--accent-mint); border:none; border-radius:6px; padding:0 18px; cursor:pointer; font-weight:bold; font-size:1rem;">등록</button>
                </div>
            </div>

            <div class="card card-2">
                <div class="card-header" style="color: var(--accent-gold);">🏫 3학년부 주요 업무 D-Day</div>
                <div class="period-notifier" id="periodInfo">일과 시간 로딩 중...</div>
                <div style="display:flex; gap:8px; margin-bottom:15px;">
                    <input type="text" id="ddayName" placeholder="일정명" style="flex-grow:1; background:rgba(0,0,0,0.2); color:#fff; border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:10px; font-size:1rem;">
                    <input type="date" id="ddayDate" style="background:rgba(0,0,0,0.2); color:#fff; border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:10px; color-scheme:dark; font-size:1rem;">
                    <button onclick="addDday()" style="background:var(--accent-mint); border:none; border-radius:6px; padding:0 18px; cursor:pointer; font-weight:bold; font-size:1rem;">추가</button>
                </div>
                <div id="ddayList"></div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyT1sm-0Qy8PzqNZRY_b1zaMX8Fv2oam4PpteahW62b05gtSSwLrkoyEO-1bhAEcnwyIA/exec"; 

        function updateTime() {
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('currentDate').textContent = `${now.getFullYear()}년 ${String(now.getMonth()+1).padStart(2,'0')}월 ${String(now.getDate()).padStart(2,'0')}일 (${days[now.getDay()]})`;
            
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('currentTime').textContent = `${h}:${m}:${s}`;

            const timeVal = parseInt(h + m);
            const day = now.getDay();
            let pText = "현재 수업 외 시간입니다.";
            
            if (day === 3) {
                if (timeVal >= 900 && timeVal < 910) pText = "조회 시간입니다.";
                else if (timeVal >= 910 && timeVal < 955) pText = "현재 1교시 수업 중입니다.";
                else if (timeVal >= 1005 && timeVal < 1050) pText = "현재 2교시 수업 중입니다.";
                else if (timeVal >= 1100 && timeVal < 1145) pText = "현재 3교시 수업 중입니다.";
                else if (timeVal >= 1155 && timeVal < 1240) pText = "현재 4교시 수업 중입니다.";
                else if (timeVal >= 1240 && timeVal < 1340) pText = "점심 시간입니다. 🍱";
                else if (timeVal >= 1340 && timeVal < 1425) pText = "현재 5교시 수업 중입니다.";
                else if (timeVal >= 1435 && timeVal < 1520) pText = "현재 6교시 수업 중입니다.";
            } else if (day >= 1 && day <= 5) {
                if (timeVal >= 850 && timeVal < 900) pText = "조회 시간입니다.";
                else if (timeVal >= 900 && timeVal < 945) pText = "현재 1교시 수업 중입니다.";
                else if (timeVal >= 955 && timeVal < 1040) pText = "현재 2교시 수업 중입니다.";
                else if (timeVal >= 1050 && timeVal < 1135) pText = "현재 3교시 수업 중입니다.";
                else if (timeVal >= 1145 && timeVal < 1230) pText = "현재 4교시 수업 중입니다.";
                else if (timeVal >= 1230 && timeVal < 1330) pText = "점심 시간입니다. 🍱";
                else if (timeVal >= 1330 && timeVal < 1415) pText = "현재 5교시 수업 중입니다.";
                else if (timeVal >= 1425 && timeVal < 1510) pText = "현재 6교시 수업 중입니다.";
            }
            document.getElementById('periodInfo').textContent = pText;
        }
        updateTime(); setInterval(updateTime, 1000);

        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=34.8806&longitude=128.6211&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul`);
                const data = await res.json();
                const temp = Math.round(data.current.temperature_2m);
                const code = data.current.weather_code;
                let icon = "☁️"; if(code === 0) icon = "☀️"; else if(code < 3) icon = "⛅";
                document.getElementById('weatherInfo').innerHTML = `거제 날씨: ${icon} ${temp}°C <span style="font-size:0.8rem; color:var(--text-sub);">(최고 ${Math.round(data.daily.temperature_2m_max[0])}° / 최저 ${Math.round(data.daily.temperature_2m_min[0])}°)</span>`;
            } catch (e) { document.getElementById('weatherInfo').textContent = "날씨 로딩 실패"; }
        }
        fetchWeather();

        async function fetchLunchMenu() {
            try {
                const schoolRes = await fetch('https://open.neis.go.kr/hub/schoolInfo?Type=json&ATPT_OFCDC_SC_CODE=S10&SCHUL_NM=해성중학교');
                const schoolData = await schoolRes.json();
                const geojeSchool = schoolData.schoolInfo[1].row.find(s => s.ORG_RDNMA.includes('거제'));
                const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
                const mealRes = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=S10&SD_SCHUL_CODE=${geojeSchool.SD_SCHUL_CODE}&MLSV_YMD=${today}`);
                const mealData = await mealRes.json();
                if (mealData.mealServiceDietInfo) {
                    document.getElementById('lunchMenu').textContent = mealData.mealServiceDietInfo[1].row[0].DDISH_NM.replace(/<br\/>/g, ', ').replace(/[0-9.*()]/g, '').trim();
                } else { document.getElementById('lunchMenu').textContent = "오늘은 급식이 없습니다."; }
            } catch (e) { document.getElementById('lunchMenu').textContent = "급식 정보 로딩 실패"; }
        }
        fetchLunchMenu();

        const teamIcons = {
            'lg': '🏀',
            'nc': '⚾',
            'lotte': '⚾'
        };

        async function fetchSports() {
            const board = document.getElementById('sportsBoard');
            board.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">일정 로딩중...</div>';
            try {
                const res = await fetch(WEB_APP_URL + "?type=sports&t=" + new Date().getTime());
                const data = await res.json();
                
                const format = (html, key) => {
                    if (html === "예정된 경기 없음") {
                        return `
                        <div class="sports-item item-${key}" style="display:flex; align-items:center; gap:12px;">
                            <div style="font-size: 1.15rem; flex-shrink:0; filter: grayscale(100%); opacity: 0.5;">${teamIcons[key]}</div>
                            <span style="color:#888; font-size:0.95rem;">예정된 경기 없음</span>
                        </div>`;
                    }
                    
                    const time = html.split('<br>')[0];
                    const titleMatch = html.match(/bold; color:#fff">([^<]+)</);
                    const title = titleMatch ? titleMatch[1] : "경기 정보";
                    const locs = html.match(/\(([^)]+)\)/g);
                    let loc = "";
                    if(locs) {
                        const last = locs[locs.length-1].replace(/[()]/g, '');
                        loc = last.split(',')[0].trim();
                    }
                    
                    let keyword = key === 'lg' ? '세이커스' : (key === 'nc' ? 'NC' : '롯데');
                    let coloredTitle = title.replace(new RegExp(keyword, 'g'), `<span class="${key}-text">${keyword}</span>`);
                    
                    return `
                        <div class="sports-item item-${key}" style="display:flex; align-items:center; gap:12px;">
                            <div style="font-size: 1.15rem; flex-shrink:0;">${teamIcons[key]}</div>
                            <div style="flex-grow:1; display:flex; align-items:center; justify-content:space-between;">
                                <div style="display:flex; align-items:baseline; gap:8px;">
                                    <span class="team-tag">${coloredTitle}</span>
                                    <span class="game-location">${loc}</span>
                                </div>
                                <span class="game-time">${time}</span>
                            </div>
                        </div>`;
                };
                
                board.innerHTML = format(data.lg, 'lg') + format(data.nc, 'nc') + format(data.lotte, 'lotte');
            } catch (e) { board.innerHTML = '<div style="color:var(--accent-red); text-align:center;">스포츠 일정 로딩 실패</div>'; }
        }
        fetchSports();

        async function fetchNotices() {
            const board = document.getElementById('noticeBoard');
            try {
                const res = await fetch(WEB_APP_URL + "?t=" + new Date().getTime());
                const data = await res.json();
                const today = new Date().toISOString().slice(0,10);
                
                let todayHtml = '<div class="section-title">✨ 오늘의 전달사항</div>';
                let pastHtml = '<div class="section-divider"></div><div class="section-title">📅 이전 전달사항</div>';
                let hasToday = false, hasPast = false;

                data.reverse().forEach(i => {
                    const isToday = i.날짜 === today;
                    const itemHtml = `<div class="notice-item ${isToday?'today':'past'}">
                        <span class="notice-time">${isToday?'오늘':i.날짜}</span>
                        <div class="notice-text" id="text-${i.전달ID}">${i.내용.replace(/\n/g,'<br>')}</div>
                        <div style="position:absolute; top:12px; right:10px; display:flex; gap:5px;">
                            <button class="action-btn" onclick="openEditModal('${i.전달ID}')">✏️</button>
                            <button class="action-btn" onclick="deleteNotice('${i.전달ID}')" style="color:var(--accent-red);">✕</button>
                        </div>
                    </div>`;
                    if(isToday) { todayHtml += itemHtml; hasToday = true; }
                    else { pastHtml += itemHtml; hasPast = true; }
                });

                if(!hasToday) todayHtml += '<div style="text-align:center; padding:10px; color:#888;">오늘 등록된 전달사항이 없습니다.</div>';
                board.innerHTML = todayHtml + pastHtml;
            } catch (e) { board.innerHTML = "전달사항 로딩 실패"; }
        }

        async function fetchDdays() {
            const list = document.getElementById('ddayList');
            try {
                const res = await fetch(WEB_APP_URL + "?type=dday&t=" + new Date().getTime());
                const data = await res.json();
                
                data.sort((a,b) => new Date(a.날짜)-new Date(b.날짜));
                
                list.innerHTML = data.map(i => {
                    const targetDate = new Date(i.날짜);
                    targetDate.setHours(0, 0, 0, 0);
                    
                    const todayDate = new Date();
                    todayDate.setHours(0, 0, 0, 0);
                    
                    const diff = Math.round((targetDate - todayDate) / (1000 * 60 * 60 * 24));
                    const dText = diff > 0 ? `D-${diff}` : (diff === 0 ? 'D-Day' : `D+${Math.abs(diff)}`);
                    const isTodayClass = diff === 0 ? 'dday-today' : '';
                    
                    return `<div class="d-day-box ${isTodayClass}">
                        <span>${i.일정명} <span style="font-size:0.75rem; color:#888;">(${i.날짜.slice(5)})</span></span>
                        <div style="display:flex; align-items:center;">
                            <span class="accent-text">${dText}</span>
                            <button class="action-btn" style="color:#ccc; margin-left:8px; font-weight:bold;" onclick="deleteDday('${i.ID}')">✕</button>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) { list.innerHTML = "디데이 로딩 실패"; }
        }

        function checkEnter(e) { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); postNotice(); }}
        function postNotice() {
            const val = document.getElementById('noticeInput').value.trim(); if(!val) return;
            fetch(WEB_APP_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:'create', text:val})})
            .then(()=>{ document.getElementById('noticeInput').value=''; setTimeout(fetchNotices, 2000); });
        }

        let currentEditId = null;

        function openEditModal(id) {
            currentEditId = id;
            const textDiv = document.getElementById('text-' + id);
            if(textDiv) {
                const oldText = textDiv.innerHTML.replace(/<br\s*[\/]?>/gi, "\n");
                document.getElementById('editModalInput').value = oldText;
            }
            document.getElementById('editModal').style.display='flex';
        }

        function closeEditModal() { document.getElementById('editModal').style.display='none'; }
        
        function saveEdit() {
            const val = document.getElementById('editModalInput').value.trim();
            if(!val) return;
            fetch(WEB_APP_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:'update', id:currentEditId, text:val})})
            .then(()=>{ closeEditModal(); setTimeout(fetchNotices, 2000); });
        }

        function deleteNotice(id) { if(confirm("정말 삭제하시겠습니까?")) fetch(WEB_APP_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:'delete', id:id})}).then(()=>setTimeout(fetchNotices, 2000)); }
        
        function addDday() {
            const n = document.getElementById('ddayName').value; const d = document.getElementById('ddayDate').value;
            if(!n || !d) return;
            fetch(WEB_APP_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:'create', type:'dday', name:n, date:d})})
            .then(()=>{ document.getElementById('ddayName').value=''; document.getElementById('ddayDate').value=''; setTimeout(fetchDdays, 2000); });
        }
        
        function deleteDday(id) { if(confirm("삭제하시겠습니까?")) fetch(WEB_APP_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:'delete', type:'dday', id:id})}).then(()=>setTimeout(fetchDdays, 2000)); }

        fetchNotices(); fetchDdays();
        setInterval(fetchNotices, 5*60*1000); setInterval(fetchDdays, 5*60*1000); setInterval(fetchSports, 5*60*1000);
    </script>
</body>
</html>
